services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "18668:18668"
    volumes:
      - ./data:/app/data
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 18668
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18668/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
